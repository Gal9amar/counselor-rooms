services:
  - type: web
    name: counselor-rooms
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install && npx prisma migrate deploy
    startCommand: node server/src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
